<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PixelWeb OS 0.4 Beta</title>
    <style>
        :root {
            --bg: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%);
            --glass: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: var(--text);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-frame {
            width: 88vw;
            height: 88vh;
            max-width: 380px;
            max-height: 800px;
            background: var(--bg);
            border: 10px solid #222;
            border-radius: 48px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        .notch {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 14px;
            background: #111;
            border-radius: 50%;
            z-index: 100;
            border: 2px solid #222;
        }

        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 45px 18px 25px;
        }

        .at-a-glance h1 { margin: 0; font-size: 32px; font-weight: 300; }
        .at-a-glance p { margin: 5px 0; opacity: 0.8; font-size: 17px; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            margin-top: 15px;
        }

        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            transition: transform 0.1s;
        }
        .app:active { transform: scale(0.92); }

        .icon {
            width: 58px; height: 58px;
            background: var(--glass);
            border-radius: 17px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .bottom-nav { width: 100%; }

        .search-bar {
            background: rgba(255,255,255,0.95);
            height: 46px;
            border-radius: 23px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            color: #555;
            margin-bottom: 22px;
            font-size: 14px;
        }

        .dock {
            display: flex;
            justify-content: space-between;
            padding: 0 5px 5px;
        }

        .dock-icon { 
            width: 50px; height: 50px; 
            border-radius: 50%; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        .modal {
            display: none;
            position: absolute;
            inset: 0;
            background: #f8f9fa;
            color: #202124;
            z-index: 1000;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        .modal-header {
            padding: 18px;
            font-size: 20px;
            display: flex;
            align-items: center;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        .back-btn { font-size: 26px; margin-right: 18px; cursor: pointer; color: #1a73e8; }
        .item { padding: 16px 18px; border-bottom: 1px solid #f0f0f0; background: #fff; }
        .item p { margin: 0; font-weight: 500; font-size: 15px; }
        .item small { color: #70757a; font-size: 12px; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="notch"></div>
    
    <div class="screen">
        <div class="at-a-glance">
            <h1 id="clock">00:00</h1>
            <p id="date">Loading...</p>
        </div>

        <div class="app-grid">
            <div class="app" onclick="openSettings()">
                <div class="icon">⚙️</div>
                <span>Settings</span>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="search-bar">Search your phone...</div>
            <div class="dock">
                <div class="dock-icon" style="background:#34a853"></div>
                <div class="dock-icon" style="background:#4285f4"></div>
                <div class="dock-icon" style="background:#fbbc05"></div>
                <div class="dock-icon" style="background:#ea4335"></div>
            </div>
        </div>
    </div>

    <div id="settings" class="modal">
        <div class="modal-header">
            <span class="back-btn" onclick="closeSettings()">←</span>
            <span>Settings</span>
        </div>
        <div class="item" onclick="alert('PixelWeb 0.4 Beta\nDev: weirzxx\nTikTok: @weirzxx1\nBuild: 2026.04.08')">
            <p>About Phone</p>
            <small>PixelWeb 0.4 Beta | @weirzxx1</small>
        </div>
        <div class="item"><p>System</p><small>Android Web UI</small></div>
        <div class="item"><p>Display</p><small>Compact Frame with Dot-notch</small></div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    }

    function openSettings() {
        const m = document.getElementById('settings');
        m.style.display = 'block';
        setTimeout(() => m.classList.add('active'), 10);
    }

    function closeSettings() {
        const m = document.getElementById('settings');
        m.classList.remove('active');
        setTimeout(() => m.style.display = 'none', 350);
    }

    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
