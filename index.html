<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PixelWeb OS Core</title>
    <style>
        :root {
            --pixel-blue: #4285F4;
            --bg-dark: #05070a;
            --panel-glass: rgba(15, 20, 25, 0.85);
            --border-white: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; 
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif; 
            background: #0d1117; 
            color: #fff; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .phone-frame { 
            width: 100vw; 
            height: 100vh; 
            background: #000; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        
        @media (min-width: 500px) {
            .phone-frame { 
                width: 380px; 
                height: 800px; 
                border: 10px solid #1a1a1a; 
                border-radius: 50px; 
                box-shadow: 0 0 100px rgba(66, 133, 244, 0.15);
            }
        }

        #boot-screen { 
            position: absolute; inset: 0; background: #000; z-index: 9999; 
            display: flex; justify-content: center; align-items: center; 
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .boot-logo { text-align: center; }
        .boot-logo h1 { font-size: 36px; font-weight: 700; letter-spacing: -1.5px; margin-bottom: 5px; }
        .boot-logo p { font-size: 12px; color: #444; text-transform: uppercase; letter-spacing: 2px; }
        
        .loader-track { 
            position: absolute; bottom: 80px; width: 100px; height: 2px; 
            background: #111; border-radius: 1px; overflow: hidden; 
        }
        #loader-bar { width: 0%; height: 100%; background: var(--pixel-blue); transition: width 3s linear; }

        #home-screen { 
            width: 100%; height: 100%; padding: 60px 20px; 
            background: linear-gradient(180deg, #0f172a 0%, #000000 100%);
            transition: transform 0.5s ease, filter 0.5s ease, opacity 0.5s ease;
        }
        .home-blur { transform: scale(0.92); filter: blur(15px); opacity: 0.6; }

        .status-area { text-align: center; margin-bottom: 40px; }
        #clock { font-size: 72px; font-weight: 200; text-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #date { font-size: 16px; color: rgba(255,255,255,0.6); margin-top: -5px; }

        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .app-box { text-align: center; cursor: pointer; }
        .app-icon { 
            width: 60px; height: 60px; background: var(--panel-glass); 
            backdrop-filter: blur(12px); border-radius: 16px; margin: 0 auto 8px; 
            display: flex; align-items: center; justify-content: center; font-size: 28px;
            border: 1px solid var(--border-white); transition: transform 0.2s;
        }
        .app-box:active .app-icon { transform: scale(0.9); }
        .app-label { font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.9); }

        .pixel-dock { 
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 92%; height: 70px; background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(25px); border-radius: 35px; 
            display: flex; justify-content: space-evenly; align-items: center;
            border: 1px solid var(--border-white); z-index: 100;
        }

        .pixel-modal { 
            position: absolute; inset: 0; background: #000; z-index: 2000; 
            display: none; opacity: 0; transform: scale(0.5);
            transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); 
            flex-direction: column; 
        }
        .pixel-modal.active { display: flex; opacity: 1; transform: scale(1); }
        
        .header { padding: 50px 24px 20px; display: flex; align-items: center; font-size: 20px; font-weight: 600; border-bottom: 1px solid #111; }
        .back-btn { font-size: 26px; color: var(--pixel-blue); margin-right: 15px; cursor: pointer; }
        .content { flex: 1; overflow-y: auto; padding: 20px; }
        
        .list-item { 
            padding: 18px 0; border-bottom: 1px solid #111; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;
        }

        .home-pill { 
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); 
            width: 120px; height: 4px; background: rgba(255,255,255,0.3); 
            border-radius: 2px; z-index: 9000; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div id="boot-screen">
        <div class="boot-logo">
            <h1>PixelWeb</h1>
            <p>OS Core</p>
        </div>
        <div class="loader-track"><div id="loader-bar"></div></div>
    </div>

    <div id="home-screen">
        <div class="status-area">
            <h1 id="clock">00:00</h1>
            <p id="date">Загрузка...</p>
        </div>
        <div class="app-grid">
            <div class="app-box" onclick="openPixelApp('settings-page', event)">
                <div class="app-icon">⚙️</div>
                <div class="app-label">Settings</div>
            </div>
        </div>
        <div class="pixel-dock">
            <div class="app-icon" style="width:48px; height:48px;" onclick="openPixelApp('phone', event)">📞</div>
            <div class="app-icon" style="width:48px; height:48px;" onclick="openPixelApp('chat', event)">💬</div>
            <div class="app-icon" style="width:48px; height:48px;" onclick="openPixelApp('web', event)">🌐</div>
            <div class="app-icon" style="width:48px; height:48px;" onclick="openPixelApp('cam', event)">📷</div>
        </div>
    </div>

    <div id="settings-page" class="pixel-modal">
        <div class="header"><span class="back-btn" onclick="closePixelApp('settings-page')">←</span> Settings</div>
        <div class="content">
            <div class="list-item" onclick="openPixelApp('about-page', event)">
                <div>
                    <p>About Device</p>
                    <small style="color:#666">PixelWeb v0.10.2</small>
                </div>
                <span style="color:#333">→</span>
            </div>
        </div>
    </div>

    <div id="about-page" class="pixel-modal">
        <div class="header"><span class="back-btn" onclick="closePixelApp('about-page')">←</span> About</div>
        <div class="content">
            <h2 style="margin-bottom:10px;">PixelWeb OS</h2>
            <p style="color:#888; line-height:1.6">Версия: 0.10.2 Beta<br>Разработчик: @weirzxx1<br>Ядро: WebKit PixelCore</p>
            <div class="list-item" style="margin-top:20px; border-top:1px solid #111">
                <p>System Update</p>
                <small style="color:var(--pixel-blue)">Latest version</small>
            </div>
        </div>
    </div>

    <div id="phone" class="pixel-modal"><div class="header"><span class="back-btn" onclick="closePixelApp('phone')">←</span> Phone</div></div>
    <div id="chat" class="pixel-modal"><div class="header"><span class="back-btn" onclick="closePixelApp('chat')">←</span> Messages</div></div>
    <div id="web" class="pixel-modal"><div class="header"><span class="back-btn" onclick="closePixelApp('web')">←</span> Browser</div></div>
    <div id="cam" class="pixel-modal"><div class="header"><span class="back-btn" onclick="closePixelApp('cam')">←</span> Camera</div></div>

    <div class="home-pill" onclick="goHome()"></div>
</div>

<script>
    window.onload = () => {
        document.getElementById('loader-bar').style.width = '100%';
        setTimeout(() => {
            const boot = document.getElementById('boot-screen');
            boot.style.opacity = '0';
            setTimeout(() => boot.style.display = 'none', 1000);
        }, 3000);
    };

    function ticTac() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date').textContent = now.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    setInterval(ticTac, 1000); ticTac();

    function openPixelApp(id, ev) {
        const app = document.getElementById(id);
        if (ev) {
            const r = ev.currentTarget.getBoundingClientRect();
            app.style.transformOrigin = `${r.left + r.width/2}px ${r.top + r.height/2}px`;
        }
        app.style.display = 'flex';
        setTimeout(() => app.classList.add('active'), 10);
        document.getElementById('home-screen').classList.add('home-blur');
    }

    function closePixelApp(id) {
        const app = document.getElementById(id);
        app.classList.remove('active');
        if (document.querySelectorAll('.pixel-modal.active').length <= 1) {
            document.getElementById('home-screen').classList.remove('home-blur');
        }
        setTimeout(() => app.style.display = 'none', 450);
    }

    function goHome() {
        document.querySelectorAll('.pixel-modal').forEach(m => m.classList.remove('active'));
        document.getElementById('home-screen').classList.remove('home-blur');
        setTimeout(() => {
            document.querySelectorAll('.pixel-modal').forEach(m => m.style.display = 'none');
        }, 450);
    }
</script>

</body>
</html>
