<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PixelWeb OS Core</title>
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --subtext: #888;
            --blue: #4285F4;
            --panel-bg: rgba(20, 20, 20, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #000; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* КОРПУС ТЕЛЕФОНА */
        .phone-frame { 
            width: 380px; 
            height: 800px; 
            background: #000; 
            position: relative; 
            overflow: hidden; 
            border: 12px solid #222; 
            border-radius: 54px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }
        
        @media (max-width: 500px) {
            .phone-frame { width: 100vw; height: 100vh; border: none; border-radius: 0; }
        }

        /* ОБОИ */
        #home-screen { 
            width: 100%; 
            height: 100%; 
            padding: 60px 24px; 
            background-image: url('wallpaper.png'); 
            background-size: cover;
            background-position: center;
            transition: transform 0.4s ease, opacity 0.4s ease, filter 0.4s ease; 
        }

        .home-hidden { transform: scale(0.95); opacity: 0.5; filter: blur(8px); }

        /* ЭКРАН ЗАГРУЗКИ */
        #boot-screen { position: absolute; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease; }
        .boot-logo-text { font-size: 32px; font-weight: 600; color: #fff; }
        .boot-loader { position: absolute; bottom: 100px; width: 120px; height: 3px; background: #222; overflow: hidden; }
        #boot-bar { width: 0%; height: 100%; background: #fff; transition: width 3.5s linear; }

        /* ШТОРКА */
        #control-center { position: absolute; top: -100%; left: 0; width: 100%; height: 100%; background: var(--panel-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 5000; transition: top 0.4s cubic-bezier(0.1, 0, 0.3, 1); padding: 60px 24px; opacity: 0; pointer-events: none; }
        #control-center.active { top: 0; opacity: 1; pointer-events: auto; }
        .status-bar-touch { position: absolute; top: 0; left: 0; width: 100%; height: 40px; z-index: 6000; cursor: pointer; }

        /* МОДАЛКИ (ПРИЛОЖЕНИЯ) */
        .modal { position: absolute; inset: 0; background: #000; z-index: 2000; display: none; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); flex-direction: column; color: #fff; }
        .modal.active { display: flex; transform: translateY(0); }
        .modal-header { padding: 50px 24px 15px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; font-size: 19px; }
        .modal-content { flex: 1; overflow-y: auto; padding: 20px; }

        /* НИЖНИЙ ДОК */
        .bottom-bar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; height: 64px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-radius: 32px; display: flex; justify-content: space-evenly; align-items: center; }
        .dock-icon { width: 44px; height: 44px; background: #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }
        
        .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 5px; background: rgba(255,255,255,0.8); border-radius: 10px; z-index: 7000; cursor: pointer; }

        /* СЕТКА ПЛИТОК В CC */
        .qs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .qs-tile { background: #333; padding: 16px; border-radius: 24px; display: flex; align-items: center; gap: 12px; color: #fff; }
        .qs-tile.on { background: var(--blue); color: #000; }
    </style>
</head>
<body>

<div id="boot-screen">
    <div style="text-align:center">
        <div class="boot-logo-text">PixelWeb</div>
        <div style="color:#888; font-size:14px; margin-top:8px;">0.10.2 Beta</div>
        <div class="boot-loader"><div id="boot-bar"></div></div>
    </div>
</div>

<div class="phone-frame">
    <div class="status-bar-touch" onclick="toggleCC()"></div>

    <div id="control-center">
        <div style="display: flex; justify-content: space-between; align-items: center; color:#fff">
            <span>PixelWeb</span>
            <span onclick="toggleCC()" style="font-size: 24px; cursor: pointer;">✕</span>
        </div>
        <div class="qs-grid">
            <div class="qs-tile on"><i>📶</i><span>Wi-Fi</span></div>
            <div class="qs-tile on"><i>🦷</i><span>BT</span></div>
        </div>
    </div>

    <div id="home-screen">
        <div style="text-align: center; margin-top: 40px; color:#fff">
            <h1 id="clock" style="font-size: 64px; font-weight: 300;">00:00</h1>
            <p id="date" style="color: #ccc;">Loading...</p>
        </div>
        
        <div style="margin-top: 40px;">
            <div onclick="openApp('settings-page')" style="width: 56px; height: 56px; background: #222; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto; cursor: pointer;">⚙️</div>
        </div>

        <div class="bottom-bar">
            <div class="dock-icon">📞</div>
            <div class="dock-icon">💬</div>
            <div class="dock-icon">🌐</div>
            <div class="dock-icon">📷</div>
        </div>
    </div>

    <div id="settings-page" class="modal">
        <div class="modal-header">
            <span onclick="closeApp('settings-page')" style="color:var(--blue); cursor:pointer; margin-right:15px;">←</span>
            <span>Settings</span>
        </div>
        <div class="modal-content">
            <div style="padding: 15px; border-bottom: 1px solid #222;">
                <p>PixelWeb OS 0.10.2 Beta</p>
                <small style="color:#888">Developer: @weirzxx1</small>
            </div>
        </div>
    </div>

    <div class="home-indicator" onclick="closeAllApps()"></div>
</div>

<script>
    window.addEventListener('load', () => {
        document.getElementById('boot-bar').style.width = '100%';
        setTimeout(() => {
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('boot-screen').style.display = 'none'; }, 800);
        }, 3500);
    });

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    }
    setInterval(updateTime, 1000); updateTime();

    function openApp(id) {
        const el = document.getElementById(id);
        el.style.display = 'flex';
        setTimeout(() => el.classList.add('active'), 10);
        document.getElementById('home-screen').classList.add('home-hidden');
    }

    function closeApp(id) {
        document.getElementById(id).classList.remove('active');
        document.getElementById('home-screen').classList.remove('home-hidden');
        setTimeout(() => { document.getElementById(id).style.display = 'none'; }, 400);
    }

    function closeAllApps() {
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        document.getElementById('home-screen').classList.remove('home-hidden');
        document.getElementById('control-center').classList.remove('active');
    }

    function toggleCC() { document.getElementById('control-center').classList.toggle('active'); }
</script>
</body>
</html>
