<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PixelWeb OS 0.3</title>
    <style>
        :root {
            --bg: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%);
            --glass: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: var(--text);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-frame {
            width: 92vw;
            height: 92vh;
            max-width: 400px;
            max-height: 800px;
            background: var(--bg);
            border: 8px solid #222;
            border-radius: 45px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .notch {
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 40%; height: 25px;
            background: #222;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 100;
        }

        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 20px 20px;
        }

        .at-a-glance h1 { margin: 0; font-size: 32px; font-weight: 400; }
        .at-a-glance p { margin: 5px 0; opacity: 0.8; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding-top: 30px;
        }

        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
        }

        .icon {
            width: 55px; height: 55px;
            background: var(--glass);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .bottom-nav { width: 100%; }

        .search-bar {
            background: rgba(255,255,255,0.9);
            height: 45px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: #555;
            margin-bottom: 20px;
        }

        .dock {
            display: flex;
            justify-content: space-around;
            padding-bottom: 10px;
        }

        .dock-icon { width: 50px; height: 50px; border-radius: 50%; }

        /* Settings Modal */
        .modal {
            display: none;
            position: absolute;
            inset: 0;
            background: #f8f9fa;
            color: #202124;
            z-index: 1000;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        .modal-header {
            padding: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .back-btn { font-size: 24px; margin-right: 20px; cursor: pointer; color: #1a73e8; }
        .item { padding: 15px 20px; border-bottom: 1px solid #eee; }
        .item p { margin: 0; font-weight: 500; }
        .item small { color: #777; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="notch"></div>
    
    <div class="screen">
        <div class="at-a-glance">
            <h1 id="clock">00:00</h1>
            <p id="date">Loading...</p>
        </div>

        <div class="app-grid">
            <div class="app" onclick="openSettings()">
                <div class="icon">⚙️</div>
                <span>Settings</span>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="search-bar">Google Search...</div>
            <div class="dock">
                <div class="dock-icon" style="background:#34a853"></div>
                <div class="dock-icon" style="background:#4285f4"></div>
                <div class="dock-icon" style="background:#fbbc05"></div>
                <div class="dock-icon" style="background:#ea4335"></div>
            </div>
        </div>
    </div>

    <div id="settings" class="modal">
        <div class="modal-header">
            <span class="back-btn" onclick="closeSettings()">←</span>
            <span>Settings</span>
        </div>
        <div class="item" onclick="alert('PixelWeb 0.3 Alpha\nDev: weirzxx\nTikTok: @weirzxx1')">
            <p>About Phone</p>
            <small>PixelWeb 0.3 Alpha</small>
        </div>
        <div class="item"><p>System</p><small>Build 2026.04.08</small></div>
        <div class="item"><p>Display</p><small>Pixel Style</small></div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    }

    function openSettings() {
        const m = document.getElementById('settings');
        m.style.display = 'block';
        setTimeout(() => m.classList.add('active'), 10);
    }

    function closeSettings() {
        const m = document.getElementById('settings');
        m.classList.remove('active');
        setTimeout(() => m.style.display = 'none', 300);
    }

    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
