<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PixelWeb OS 0.8.1 Beta</title>
    <style>
        :root {
            --bg: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%);
            --glass: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
            --spring: cubic-bezier(0.32, 0.72, 0, 1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #000; color: var(--text);
            overflow: hidden; display: flex;
            justify-content: center; align-items: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .phone-frame {
            width: 88vw; height: 88vh;
            max-width: 380px; max-height: 800px;
            background: var(--bg);
            border: 10px solid #222; border-radius: 48px;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        .notch {
            position: absolute; top: 15px; left: 50%;
            transform: translateX(-50%); width: 12px; height: 12px;
            background: #111; border-radius: 50%;
            z-index: 5000; border: 2px solid #222;
        }

        #home-screen {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 45px 18px 20px; box-sizing: border-box;
            transition: transform 0.6s var(--spring), opacity 0.6s ease, filter 0.6s ease;
        }

        .home-dimmed { transform: scale(0.95); opacity: 0.5; filter: blur(15px); }

        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }

        .app { display: flex; flex-direction: column; align-items: center; font-size: 11px; cursor: pointer; }
        .icon {
            width: 58px; height: 58px;
            background: var(--glass); border-radius: 17px;
            backdrop-filter: blur(10px); display: flex;
            align-items: center; justify-content: center; font-size: 28px;
            margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        .app:active .icon { transform: scale(0.9); }

        .modal {
            position: absolute; inset: 0;
            background: #f8f9fa; color: #202124;
            z-index: 2000; border-radius: 48px;
            display: none; opacity: 0;
            transform-origin: center;
            transition: transform 0.6s var(--spring), opacity 0.4s ease, border-radius 0.6s var(--spring);
            overflow: hidden; flex-direction: column;
        }

        .modal.active {
            display: flex; opacity: 1;
            transform: scale(1) translate(0, 0) !important;
            border-radius: 48px;
        }

        .modal-header {
            padding: 45px 20px 20px; font-size: 24px;
            font-weight: 500; display: flex; align-items: center;
            background: #fff; border-bottom: 1px solid #eee; flex-shrink: 0;
        }

        .back-btn { font-size: 28px; margin-right: 15px; cursor: pointer; color: #1a73e8; }
        .modal-content { flex: 1; overflow-y: auto; }
        .item { padding: 18px 20px; border-bottom: 1px solid #f0f0f0; background: #fff; }
        .item p { margin: 0; font-weight: 500; }
        .item small { color: #777; }

        .nav-zone {
            width: 100%; height: 40px;
            position: absolute; bottom: 0; left: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 4000; touch-action: none;
        }
        .nav-handle { width: 120px; height: 4px; background: rgba(255,255,255,0.6); border-radius: 2px; }

        .search-bar {
            background: rgba(255,255,255,0.95); height: 46px; border-radius: 23px;
            display: flex; align-items: center; padding: 0 16px; color: #555;
            margin-bottom: 22px; font-size: 14px;
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="notch"></div>
    
    <div id="home-screen">
        <div style="padding: 10px;">
            <h1 id="clock" style="font-size: 32px; font-weight: 300; margin:0;">00:00</h1>
        </div>

        <div class="app-grid">
            <div class="app" id="settings-icon" onclick="openAppWithZoom('settings-page', 'settings-icon')">
                <div class="icon">⚙️</div>
                <span>Settings</span>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="search-bar">Search...</div>
        </div>
    </div>

    <div id="settings-page" class="modal">
        <div class="modal-header">
            <span class="back-btn" onclick="closeAppWithZoom()">←</span>
            <span>Settings</span>
        </div>
        <div class="modal-content">
            <div class="item">
                <p>Version 0.8.1 Beta</p>
                <small>Fixed Zoom Logic & Cleaned Layout</small>
            </div>
            <div class="item">
                <p>Developer</p>
                <small>weirzxx</small>
            </div>
        </div>
    </div>

    <div class="nav-zone" id="nav-zone">
        <div class="nav-handle"></div>
    </div>
</div>

<script>
    const home = document.getElementById('home-screen');
    const frame = document.querySelector('.phone-frame');
    let activeAppId = null;
    let originIconId = null;

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateTime, 1000); updateTime();

    function openAppWithZoom(appId, iconId) {
        activeAppId = appId;
        originIconId = iconId;
        const app = document.getElementById(appId);
        const icon = document.getElementById(iconId);
        const rect = icon.getBoundingClientRect();
        const frameRect = frame.getBoundingClientRect();
        
        const centerX = rect.left + rect.width / 2 - frameRect.left;
        const centerY = rect.top + rect.height / 2 - frameRect.top;

        app.style.display = 'flex';
        app.style.transition = 'none';
        app.style.transform = `translate(${centerX - (frameRect.width / 2)}px, ${centerY - (frameRect.height / 2)}px) scale(0.1)`;
        app.style.opacity = '0';
        app.style.borderRadius = '30px';

        setTimeout(() => {
            app.style.transition = 'transform 0.6s var(--spring), opacity 0.4s ease, border-radius 0.6s var(--spring)';
            app.classList.add('active');
            home.classList.add('home-dimmed');
        }, 30);
    }

    function closeAppWithZoom() {
        if (!activeAppId) return;
        const app = document.getElementById(activeAppId);
        const icon = document.getElementById(originIconId);
        const rect = icon.getBoundingClientRect();
        const frameRect = frame.getBoundingClientRect();
        
        const centerX = rect.left + rect.width / 2 - frameRect.left;
        const centerY = rect.top + rect.height / 2 - frameRect.top;

        app.classList.remove('active');
        app.style.transform = `translate(${centerX - (frameRect.width / 2)}px, ${centerY - (frameRect.height / 2)}px) scale(0.1)`;
        app.style.opacity = '0';
        app.style.borderRadius = '30px';
        home.classList.remove('home-dimmed');

        setTimeout(() => {
            app.style.display = 'none';
            activeAppId = null;
        }, 600);
    }

    let startY = 0;
    document.getElementById('nav-zone').addEventListener('touchstart', e => {
        if (activeAppId) startY = e.touches[0].clientY;
    });

    document.getElementById('nav-zone').addEventListener('touchend', e => {
        if (activeAppId && (startY - e.changedTouches[0].clientY > 40)) {
            closeAppWithZoom();
        }
    });
</script>
</body>
</html>
