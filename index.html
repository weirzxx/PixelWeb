<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PixelWeb OS 0.9.1 Core</title>
    
    <link rel="stylesheet" href="css/root.css">
    <link rel="stylesheet" href="css/boot.css">
</head>
<body>

<div id="boot-screen">
    <div class="boot-container">
        <div id="boot-glow"></div>
        
        <div id="google-logo" style="display:none;">
            <svg viewBox="0 0 24 24" width="60" height="60">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
            </svg>
        </div>
        <div id="boot-progress">
            <div id="boot-bar"></div>
        </div>
    </div>
</div>

<div class="phone-frame">
    <div id="home-screen">
        <div class="widget-clock" style="text-align: center; margin-top: 40px;">
            <h1 id="clock" style="font-size: 64px; font-weight: 300; margin: 0;">00:00</h1>
            <p id="date" style="color: var(--subtext); font-size: 18px; margin: 5px 0 0;">Загрузка...</p>
        </div>
        <div class="app-grid" style="display: flex; justify-content: center; margin-top: 50px;">
            <div class="app" onclick="openApp('settings-page')" style="cursor: pointer; text-align: center;">
                <div class="icon" style="font-size: 40px; background: #222; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; border-radius: 16px; margin-bottom: 8px;">⚙️</div>
                <span style="font-size: 12px; color: var(--subtext);">Settings</span>
            </div>
        </div>
    </div>

    <div id="settings-page" class="modal">
        <div class="modal-header" style="padding: 50px 24px 15px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center;">
            <span onclick="closeApp()" style="color:var(--blue); cursor:pointer; font-size:24px; margin-right:15px;">←</span>
            <span style="font-weight: 500;">Settings</span>
        </div>
        <div class="modal-content">
            <div class="item" style="padding: 20px 24px;" onclick="openApp('about-page')">
                <p style="margin: 0; font-size: 16px;">About Phone</p>
                <small style="color:var(--subtext);">PixelWeb Core 0.9.1</small>
            </div>
        </div>
    </div>

    <div id="about-page" class="modal">
        <div class="modal-header" style="padding: 50px 24px 15px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center;">
            <span onclick="backToSettings('about-page')" style="color:var(--blue); cursor:pointer; font-size:24px; margin-right:15px;">←</span>
            <span style="font-weight: 500;">About Phone</span>
        </div>
        <div class="modal-content" style="padding: 24px;">
            <p style="color: var(--subtext); margin-bottom: 4px; font-size: 14px;">Developer</p>
            <p style="margin: 0 0 20px; font-size: 18px;">weirzxx</p>
            <p style="color: var(--subtext); margin-bottom: 4px; font-size: 14px;">System</p>
            <p style="margin: 0 0 20px; font-size: 18px;">System HTML 5 | PixelWeb Core</p>
            <div style="text-align: center; margin-top: 50px; opacity: 0.5;">TikTok: @weirzxx1</div>
        </div>
    </div>
</div>

<script>
    // Логика заставки (как на видео)
    window.addEventListener('load', () => {
        const glow = document.getElementById('boot-glow');
        const logo = document.getElementById('google-logo');
        const progress = document.getElementById('boot-progress');
        const bar = document.getElementById('boot-bar');
        const screen = document.getElementById('boot-screen');

        // 1. Показываем ромб 2.5 секунды
        setTimeout(() => {
            glow.style.display = 'none';
            logo.style.display = 'block';
            progress.style.display = 'block';
            
            // 2. Заполняем полоску
            setTimeout(() => { bar.style.width = '100%'; }, 100);
            
            // 3. Плавно убираем экран загрузки
            setTimeout(() => {
                screen.style.opacity = '0';
                setTimeout(() => { screen.style.display = 'none'; }, 800);
            }, 3000);
        }, 2500);
    });

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date').innerText = now.toLocaleDateString('ru-RU', { weekday: 'long', month: 'short', day: 'numeric' });
    }
    setInterval(updateTime, 1000); updateTime();

    function openApp(id) {
        const el = document.getElementById(id);
        el.style.display = 'flex';
        setTimeout(() => el.classList.add('active'), 10);
        if(id === 'settings-page') document.getElementById('home-screen').classList.add('home-hidden');
    }
    function backToSettings(id) {
        document.getElementById(id).classList.remove('active');
        setTimeout(() => document.getElementById(id).style.display = 'none', 450);
    }
    function closeApp() {
        document.getElementById('settings-page').classList.remove('active');
        document.getElementById('home-screen').classList.remove('home-hidden');
        setTimeout(() => document.getElementById('settings-page').style.display = 'none', 450);
    }
</script>
</body>
</html>
