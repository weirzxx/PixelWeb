<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>PixelWeb OS</title>
    <style>
        :root {
            --bg: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%);
            --glass: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            user-select: none;
        }

        .screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px 20px 20px;
            box-sizing: border-box;
        }

        /* At a Glance */
        .at-a-glance { padding-left: 10px; }
        .at-a-glance h1 { margin: 0; font-size: 28px; font-weight: 400; }
        .at-a-glance p { margin: 5px 0; opacity: 0.8; }

        /* Apps */
        .app-grid {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding-top: 40px;
        }

        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .icon {
            width: 60px; height: 60px;
            background: var(--glass);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Bottom Search & Dock */
        .search {
            background: rgba(255,255,255,0.9);
            height: 50px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: #555;
            margin-bottom: 20px;
        }

        .dock {
            display: flex;
            justify-content: space-around;
            padding-bottom: 10px;
        }

        .dock-icon {
            width: 55px; height: 55px;
            border-radius: 50%;
            background: var(--glass);
        }

        /* Settings Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #ffffff;
            color: #000;
            z-index: 1000;
            animation: slide 0.3s ease-out;
        }

        @keyframes slide { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-header {
            padding: 20px;
            font-size: 22px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }

        .back-btn { font-size: 30px; margin-right: 20px; cursor: pointer; }

        .item { padding: 15px 20px; border-bottom: 1px solid #f5f5f5; }
        .item p { margin: 0; font-weight: 500; }
        .item small { color: #888; }
    </style>
</head>
<body>

    <div class="screen">
        <div class="at-a-glance">
            <h1 id="clock">00:00</h1>
            <p id="date">Loading...</p>
        </div>

        <div class="app-grid">
            <div class="app" onclick="toggleSettings(true)">
                <div class="icon">⚙️</div>
                <span>Settings</span>
            </div>
        </div>

        <div class="bottom">
            <div class="search">Google Search...</div>
            <div class="dock">
                <div class="dock-icon" style="background:#4caf50"></div>
                <div class="dock-icon" style="background:#2196f3"></div>
                <div class="dock-icon" style="background:#ffc107"></div>
                <div class="dock-icon" style="background:#f44336"></div>
            </div>
        </div>
    </div>

    <div id="settings" class="modal">
        <div class="modal-header">
            <span class="back-btn" onclick="toggleSettings(false)">←</span>
            <span>Settings</span>
        </div>
        <div class="item" onclick="alert('PixelWeb Beta 0.2\nBuild: 2026.04.08\nDev: weirzxx')">
            <p>About Phone</p>
            <small>PixelWeb 0.2 Beta</small>
        </div>
        <div class="item"><p>System</p><small>None</small></div>
        <div class="item"><p>Display</p><small>None</small></div>
        <div class="item"><p>Storage</p><small>None</small></div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        }

        function toggleSettings(show) {
            document.getElementById('settings').style.display = show ? 'block' : 'none';
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
  </html>
