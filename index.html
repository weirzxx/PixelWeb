<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PixelWeb OS 0.5 Beta</title>
    <style>
        :root {
            --bg: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%);
            --glass: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
            --spring: cubic-bezier(0.2, 1, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: var(--text);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .phone-frame {
            width: 88vw;
            height: 88vh;
            max-width: 380px;
            max-height: 800px;
            background: var(--bg);
            border: 10px solid #222;
            border-radius: 48px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        .notch {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            width: 12px; height: 12px;
            background: #111;
            border-radius: 50%;
            z-index: 100;
            border: 2px solid #222;
        }

        /* Контейнер для эффекта отдаления фона */
        #home-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 45px 18px 20px;
            box-sizing: border-box;
            transition: transform 0.5s var(--spring), opacity 0.5s ease;
        }

        .home-dimmed {
            transform: scale(0.9);
            opacity: 0.5;
            filter: blur(4px);
        }

        .at-a-glance h1 { margin: 0; font-size: 32px; font-weight: 300; }
        .at-a-glance p { margin: 5px 0; opacity: 0.8; font-size: 17px; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
        }

        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            cursor: pointer;
        }

        .icon {
            width: 58px; height: 58px;
            background: var(--glass);
            border-radius: 17px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 5px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }

        .app:active .icon { transform: scale(0.9); }

        .bottom-nav { width: 100%; }
        .search-bar {
            background: rgba(255,255,255,0.95);
            height: 46px; border-radius: 23px;
            display: flex; align-items: center;
            padding: 0 16px; color: #555;
            margin-bottom: 22px; font-size: 14px;
        }

        .dock { display: flex; justify-content: space-between; padding: 0 5px 10px; }
        .dock-icon { width: 50px; height: 50px; border-radius: 50%; }

        /* Полоска навигации */
        .nav-handle {
            width: 120px; height: 4px;
            background: rgba(255,255,255,0.6);
            border-radius: 2px;
            position: absolute;
            bottom: 10px; left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            touch-action: none;
        }

        /* Приложение (Модалка) */
        .modal {
            position: absolute;
            inset: 0;
            background: #f8f9fa;
            color: #202124;
            z-index: 1000;
            border-radius: 48px;
            display: none;
            opacity: 0;
            transform: scale(0.8) translateY(20%);
            transition: transform 0.5s var(--spring), opacity 0.3s ease, border-radius 0.5s;
            overflow: hidden;
        }

        .modal.active {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Анимация закрытия жестом */
        .modal.closing {
            transform: scale(0.9) translateY(100%);
            opacity: 0;
        }

        .modal-header {
            padding: 20px; font-size: 20px;
            display: flex; align-items: center;
            background: #fff; border-bottom: 1px solid #eee;
        }
        .back-btn { font-size: 24px; margin-right: 15px; cursor: pointer; color: #1a73e8; }
        .item { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; background: #fff; }
        .item p { margin: 0; font-weight: 500; }
        .item small { color: #777; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="notch"></div>
    
    <div id="home-screen">
        <div class="at-a-glance">
            <h1 id="clock">00:00</h1>
            <p id="date">Loading...</p>
        </div>

        <div class="app-grid">
            <div class="app" id="app-settings" onclick="openApp()">
                <div class="icon">⚙️</div>
                <span>Settings</span>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="search-bar">Search your phone...</div>
            <div class="dock">
                <div class="dock-icon" style="background:#34a853"></div>
                <div class="dock-icon" style="background:#4285f4"></div>
                <div class="dock-icon" style="background:#fbbc05"></div>
                <div class="dock-icon" style="background:#ea4335"></div>
            </div>
        </div>
    </div>

    <div id="nav-handle" class="nav-handle"></div>

    <div id="settings-page" class="modal">
        <div class="modal-header">
            <span class="back-btn" onclick="closeApp()">←</span>
            <span>Settings</span>
        </div>
        <div class="item" onclick="alert('PixelWeb 0.5 Beta\nDev: weirzxx')">
            <p>About Phone</p>
            <small>PixelWeb 0.5 Beta | @weirzxx1</small>
        </div>
        <div class="item">
            <p>System</p>
            <small>HTML 5 / PixelWeb Core</small>
        </div>
    </div>
</div>

<script>
    const home = document.getElementById('home-screen');
    const modal = document.getElementById('settings-page');
    const handle = document.getElementById('nav-handle');

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    }
    setInterval(updateTime, 1000); updateTime();

    // Открытие с эффектом глубины
    function openApp() {
        modal.style.display = 'block';
        setTimeout(() => {
            home.classList.add('home-dimmed');
            modal.classList.add('active');
        }, 10);
    }

    function closeApp() {
        home.classList.remove('home-dimmed');
        modal.classList.remove('active');
        setTimeout(() => { modal.style.display = 'none'; }, 500);
    }

    // ЛОГИКА ЖЕСТОВ (Полоска)
    let startY = 0;
    handle.addEventListener('touchstart', e => {
        startY = e.touches[0].clientY;
        handle.style.background = 'rgba(255,255,255,1)';
    });

    handle.addEventListener('touchmove', e => {
        let currentY = e.touches[0].clientY;
        let diff = startY - currentY;
        if (diff > 50 && modal.classList.contains('active')) {
            // Визуальный отклик при тяге вверх
            modal.style.transform = `scale(${1 - diff/1000}) translateY(${-diff/2}px)`;
        }
    });

    handle.addEventListener('touchend', e => {
        let endY = e.changedTouches[0].clientY;
        handle.style.background = 'rgba(255,255,255,0.6)';
        if (startY - endY > 100) {
            closeApp(); // Если свайпнули высоко — закрываем
        }
        modal.style.transform = ''; // Сброс трансформации
    });
</script>

</body>
</html>
