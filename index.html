<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PixelWeb OS 0.4 Beta</title>
    <style>
        :root {
            --bg: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%);
            --glass: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: var(--text);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- КОРПУС ТЕЛЕФОНА (СДЕЛАН МЕНЬШЕ И ИЗЯЩНЕЕ) --- */
        .phone-frame {
            width: 88vw; /* Было 95vw */
            height: 88vh; /* Было 95vh */
            max-width: 380px; /* Было 420px */
            max-height: 800px; /* Было 850px */
            background: var(--bg);
            border: 10px solid #222;
            border-radius: 48px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            transition: all 0.3s ease;
        }

        /* --- ТОЧКА-КАМЕРА ВМЕСТО ЧЁЛКИ --- */
        .notch {
            position: absolute;
            top: 15px; /* Чуть ниже от края */
            left: 50%;
            transform: translateX(-50%);
            width: 14px; /* Маленькая точка */
            height: 14px;
            background: #111; /* Тёмный объектив */
            border-radius: 50%; /* Круглая */
            z-index: 100;
            border: 2px solid #222; /* Ободок */
        }

        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 45px 18px 25px; /* Чуть больше отступ сверху из-за камеры */
        }

        .at-a-glance h1 { margin: 0; font-size: 32px; font-weight: 300; }
        .at-a-glance p { margin: 5px 0; opacity: 0.8; font-size: 17px; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            margin-top: 15px;
        }

        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            transition: transform 0.1s;
        }
        .app:active { transform: scale(0.92); }

        .icon {
            width: 58px; height: 58px;
            background: var(--glass);
            border-radius: 17px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .bottom-nav { width: 100%; }
