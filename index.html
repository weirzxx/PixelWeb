<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PixelWeb OS 0.8.5 Beta</title>
    <style>
        :root {
            --bg: #000000;
            --accent-bg: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --subtext: #999999;
            --spring: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000; color: var(--text);
            overflow: hidden; display: flex;
            justify-content: center; align-items: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .phone-frame {
            width: 88vw; height: 88vh;
            max-width: 380px; max-height: 800px;
            background: linear-gradient(180deg, #0f172a 0%, #000000 100%);
            border: 12px solid #222; border-radius: 54px;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: 0 0 0 2px #333, 0 30px 60px rgba(0,0,0,0.8);
        }

        .notch {
            position: absolute; top: 12px; left: 50%;
            transform: translateX(-50%); width: 100px; height: 28px;
            background: #000; border-radius: 20px;
            z-index: 5000;
        }

        #home-screen {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            padding: 60px 24px 30px; box-sizing: border-box;
            transition: transform 0.6s var(--spring), opacity 0.5s ease, filter 0.5s ease;
        }

        .home-dimmed { transform: scale(0.92); opacity: 0.4; filter: blur(10px); }

        .widget-clock { margin-bottom: 40px; }
        .widget-clock h1 { font-size: 56px; font-weight: 200; margin: 0; letter-spacing: -2px; }
        .widget-clock p { font-size: 18px; margin: 4px 0 0; color: var(--subtext); font-weight: 400; }

        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

        .app { 
            display: flex; flex-direction: column; align-items: center; 
            font-size: 12px; cursor: pointer; position: relative; z-index: 10;
        }
        .icon {
            width: 62px; height: 62px;
            background: var(--accent-bg); border-radius: 16px;
            display: flex; align-items: center; justify-content: center; 
            font-size: 32px; margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .app:active .icon { transform: scale(0.85); }

        .modal {
            position: absolute; inset: 0;
            background: #000; color: #fff;
            z-index: 2000; border-radius: 42px;
            display: none; opacity: 0;
            transition: transform 0.6s var(--spring), opacity 0.4s ease;
            overflow: hidden; flex-direction: column;
            pointer-events: none;
        }

        .modal.active {
            display: flex; opacity: 1;
            transform: translate(0, 0) scale(1) !important;
            pointer-events: auto;
        }

        .modal-header {
            padding: 50px 24px 20px; font-size: 22px;
            font-weight: 600; display: flex; align-items: center;
            background: #000; border-bottom: 1px solid #1a1a1a;
        }

        .back-btn { font-size: 24px; margin-right: 16px; cursor: pointer; color: #3b82f6; }
        
        .modal-content { flex: 1; overflow-y: auto; padding: 10px 0; }
        .item { 
            padding: 20px 24px; border-bottom: 1px solid #111; 
            display: flex; flex-direction: column;
        }
        .item p { margin: 0; font-size: 16px; font-weight: 500; }
        .item small { color: var(--subtext); margin-top: 4px; font-size: 13px; }

        .nav-zone {
            width: 100%; height: 40px;
            position: absolute; bottom: 0; left: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 4000; touch-action: none;
        }
        .nav-handle { width: 120px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 10px; }

        .bottom-area { margin-top: auto; width: 100%; padding-bottom: 20px; }
        .search-bar {
            background: rgba(255,255,255,0.08); height: 50px; border-radius: 25px;
            display: flex; align-items: center; padding: 0 20px; color: var(--subtext);
            font-size: 16px; border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="notch"></div>
    
    <div id="home-screen">
        <div class="widget-clock">
            <h1 id="clock">00:00</h1>
            <p id="date">Loading...</p>
        </div>

        <div class="app-grid">
            <div class="app" id="settings-icon">
                <div class="icon">⚙️</div>
                <span>Settings</span>
            </div>
        </div>

        <div class="bottom-area">
            <div class="search-bar">Search...</div>
        </div>
    </div>

    <div id="settings-page" class="modal">
        <div class="modal-header">
            <span class="back-btn" id="close-settings">←</span>
            <span>Settings</span>
        </div>
        <div class="modal-content">
            <div class="item"><p>System</p><small>Dark Mode OS 0.8.5</small></div>
            <div class="item"><p>Display</p><small>Brightness Fixed</small></div>
            <div class="item"><p>Developer</p><small>weirzxx</small></div>
        </div>
    </div>

    <div class="nav-zone" id="nav-zone">
        <div class="nav-handle"></div>
    </div>
</div>

<script>
    const home = document.getElementById('home-screen');
    const frame = document.querySelector('.phone-frame');
    const settingsApp = document.getElementById('settings-page');
    const settingsIcon = document.getElementById('settings-icon');
    const closeBtn = document.getElementById('close-settings');
    let activeApp = null;

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    }
    setInterval(updateTime, 1000); updateTime();

    // Новый чистый обработчик открытия
    settingsIcon.addEventListener('click', () => {
        const rect = settingsIcon.getBoundingClientRect();
        const frameRect = frame.getBoundingClientRect();
        
        const x = (rect.left + rect.width / 2) - (frameRect.left + frameRect.width / 2);
        const y = (rect.top + rect.height / 2) - (frameRect.top + frameRect.height / 2);

        settingsApp.style.display = 'flex';
        settingsApp.style.transition = 'none';
        settingsApp.style.transform = `translate(${x}px, ${y}px) scale(0.1)`;
        settingsApp.style.opacity = '0';

        setTimeout(() => {
            settingsApp.style.transition = 'transform 0.6s var(--spring), opacity 0.4s ease';
            settingsApp.classList.add('active');
            home.classList.add('home-dimmed');
            activeApp = settingsApp;
        }, 10);
    });

    function closeApp() {
        if (!activeApp) return;
        const rect = settingsIcon.getBoundingClientRect();
        const frameRect = frame.getBoundingClientRect();
        const x = (rect.left + rect.width / 2) - (frameRect.left + frameRect.width / 2);
        const y = (rect.top + rect.height / 2) - (frameRect.top + frameRect.height / 2);

        activeApp.classList.remove('active');
        activeApp.style.transform = `translate(${x}px, ${y}px) scale(0.1)`;
        activeApp.style.opacity = '0';
        home.classList.remove('home-dimmed');

        setTimeout(() => {
            activeApp.style.display = 'none';
            activeApp = null;
        }, 600);
    }

    closeBtn.addEventListener('click', closeApp);

    let startY = 0;
    document.getElementById('nav-zone').addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
    document.getElementById('nav-zone').addEventListener('touchend', e => {
        if (activeApp && (startY - e.changedTouches[0].clientY > 40)) closeApp();
    });
</script>
</body>
</html>
