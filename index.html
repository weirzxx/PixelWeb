<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PixelWeb OS 0.8.8 Legacy Anim</title>
    <style>
        :root {
            --bg: #000000;
            --accent-bg: #1a1a1a;
            --text: #ffffff;
            --subtext: #999999;
            --spring: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000; color: var(--text);
            overflow: hidden; display: flex;
            justify-content: center; align-items: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .phone-frame {
            width: 88vw; height: 88vh;
            max-width: 380px; max-height: 800px;
            background: linear-gradient(180deg, #0f172a 0%, #000000 100%);
            border: 12px solid #222; border-radius: 54px;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: 0 0 0 2px #333, 0 30px 60px rgba(0,0,0,0.8);
        }

        .notch {
            position: absolute; top: 12px; left: 50%;
            transform: translateX(-50%); width: 100px; height: 28px;
            background: #000; border-radius: 20px;
            z-index: 5000;
        }

        #home-screen {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            padding: 60px 24px 30px; box-sizing: border-box;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .home-hidden { transform: scale(0.9); opacity: 0; }

        .widget-clock { margin-bottom: 40px; }
        .widget-clock h1 { font-size: 56px; font-weight: 200; margin: 0; letter-spacing: -2px; }
        .widget-clock p { font-size: 18px; margin: 4px 0 0; color: var(--subtext); }

        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

        .app { display: flex; flex-direction: column; align-items: center; font-size: 12px; cursor: pointer; }
        .icon {
            width: 62px; height: 62px;
            background: var(--accent-bg); border-radius: 16px;
            display: flex; align-items: center; justify-content: center; 
            font-size: 32px; margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .app:active .icon { opacity: 0.7; }

        .modal {
            position: absolute; inset: 0;
            background: #000; color: #fff;
            z-index: 2000; border-radius: 42px;
            display: none;
            opacity: 0;
            transform: translateY(100px) scale(0.95);
            transition: transform 0.4s var(--spring), opacity 0.3s ease;
            overflow: hidden; flex-direction: column;
        }

        .modal.active {
            display: flex; opacity: 1;
            transform: translateY(0) scale(1);
        }

        .modal-header {
            padding: 50px 24px 20px; font-size: 22px;
            font-weight: 600; display: flex; align-items: center;
            background: #000; border-bottom: 1px solid #1a1a1a;
        }

        .back-btn { font-size: 24px; margin-right: 16px; cursor: pointer; color: #3b82f6; padding: 10px; }
        .modal-content { flex: 1; overflow-y: auto; padding: 10px 0; }
        .item { padding: 20px 24px; border-bottom: 1px solid #111; }

        .nav-zone {
            width: 100%; height: 40px;
            position: absolute; bottom: 0; left: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 4000;
        }
        .nav-handle { width: 120px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 10px; }

        .bottom-area { margin-top: auto; padding-bottom: 20px; }
        .search-bar {
            background: rgba(255,255,255,0.08); height: 50px; border-radius: 25px;
            display: flex; align-items: center; padding: 0 20px; color: var(--subtext);
            font-size: 16px; border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="notch"></div>
    
    <div id="home-screen">
        <div class="widget-clock">
            <h1 id="clock">00:00</h1>
            <p id="date">Loading...</p>
        </div>

        <div class="app-grid">
            <div class="app" onclick="openApp('settings-page')">
                <div class="icon">⚙️</div>
                <span>Settings</span>
            </div>
        </div>

        <div class="bottom-area">
            <div class="search-bar">Search...</div>
        </div>
    </div>

    <div id="settings-page" class="modal">
        <div class="modal-header">
            <span class="back-btn" onclick="closeApp()">←</span>
            <span>Settings</span>
        </div>
        <div class="modal-content">
            <div class="item"><p>System</p><small>OS 0.8.8 Legacy Motion</small></div>
            <div class="item"><p>Animation</p><small>Android 5.0 Style (Bottom-Up)</small></div>
            <div class="item"><p>Developer</p><small>@weirzxx</small></div>
        </div>
    </div>

    <div class="nav-zone" onclick="closeApp()">
        <div class="nav-handle"></div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    }
    setInterval(updateTime, 1000); updateTime();

    let activeModal = null;

    function openApp(id) {
        const modal = document.getElementById(id);
        const home = document.getElementById('home-screen');
        
        modal.style.display = 'flex';
        setTimeout(() => {
            modal.classList.add('active');
            home.classList.add('home-hidden');
            activeModal = modal;
        }, 10);
    }

    function closeApp() {
        if (!activeModal) return;
        const home = document.getElementById('home-screen');
        
        activeModal.classList.remove('active');
        home.classList.remove('home-hidden');
        
        setTimeout(() => {
            activeModal.style.display = 'none';
            activeModal = null;
        }, 400);
    }
</script>
</body>
</html>
