<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PixelWeb OS Core</title>
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --subtext: #888;
            --accent-bg: #1a1a1a;
            --blue: #4285F4;
            --panel-bg: rgba(20, 20, 20, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        .phone-frame { width: 100vw; height: 100vh; background: #000; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        
        @media (min-width: 500px) {
            .phone-frame { width: 380px; height: 800px; border: 12px solid #222; border-radius: 54px; }
        }

        /* BOOT SCREEN */
        #boot-screen { position: absolute; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease; }
        .boot-container { text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center; }
        #boot-glow { width: 150px; height: 150px; background: radial-gradient(circle, rgba(66,133,244,0.3) 0%, transparent 70%); filter: blur(20px); animation: pulse 2s infinite; }
        #boot-progress { width: 120px; height: 3px; background: #222; border-radius: 10px; margin-top: 40px; overflow: hidden; display: none; }
        #boot-bar { width: 0%; height: 100%; background: #fff; transition: width 2.5s cubic-bezier(0.1, 0, 0.3, 1); }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } }

        /* CONTROL CENTER (Центр управления) */
        #control-center {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 5000;
            transition: top 0.4s cubic-bezier(0.1, 0, 0.3, 1);
            padding: 60px 24px;
        }
        #control-center.active { top: 0; }
        .status-bar-touch { position: absolute; top: 0; left: 0; width: 100%; height: 40px; z-index: 6000; cursor: pointer; }
        
        .qs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .qs-tile { background: #333; padding: 16px; border-radius: 24px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.2s; }
        .qs-tile.on { background: var(--blue); color: #000; }
        .qs-tile i { font-style: normal; font-size: 20px; }

        /* HOME SCREEN */
        #home-screen { width: 100%; height: 100%; padding: 60px 24px; background: linear-gradient(180deg, #101827 0%, #000 100%); transition: transform 0.4s ease, opacity 0.4s ease, filter 0.4s ease; }
        .home-hidden { transform: scale(0.95); opacity: 0.5; filter: blur(8px); }
        
        .bottom-bar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; height: 64px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-radius: 32px; display: flex; justify-content: space-evenly; align-items: center; z-index: 100; }
        .dock-icon { width: 44px; height: 44px; background: #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; transition: transform 0.1s; }
        .dock-icon:active { transform: scale(0.9); }

        /* MODALS */
        .modal { position: absolute; inset: 0; background: #000; z-index: 2000; display: none; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); flex-direction: column; }
        .modal.active { display: flex; transform: translateY(0); }
        .modal-header { padding: 50px 24px 15px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; font-size: 19px; }
        .modal-content { flex: 1; overflow-y: auto; padding: 20px; }
        .item { padding: 16px 0; border-bottom: 1px solid #111; cursor: pointer; }

        .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 5px; background: rgba(255,255,255,0.8); border-radius: 10px; z-index: 3000; }
    </style>
</head>
<body>

<div class="status-bar-touch" onclick="toggleCC()"></div>

<div id="control-center">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <span style="font-size: 14px; color: #ccc;">PixelWeb Carrier</span>
        <span onclick="toggleCC()" style="font-size: 24px; cursor: pointer;">✕</span>
    </div>
    <div class="qs-grid">
        <div class="qs-tile on" onclick="this.classList.toggle('on')"><i>📶</i><span>Wi-Fi</span></div>
        <div class="qs-tile on" onclick="this.classList.toggle('on')"><i>🦷</i><span>Bluetooth</span></div>
        <div class="qs-tile" onclick="this.classList.toggle('on')"><i>🔦</i><span>Flashlight</span></div>
        <div class="qs-tile" onclick="this.classList.toggle('on')"><i>✈️</i><span>Airplane</span></div>
    </div>
    <div style="margin-top: 40px;">
        <p style="color: #888; font-size: 13px;">Brightness</p>
        <div style="width: 100%; height: 4px; background: #333; border-radius: 2px; margin-top: 10px; position: relative;">
            <div style="width: 70%; height: 100%; background: #fff; border-radius: 2px;"></div>
        </div>
    </div>
</div>

<div id="boot-screen">
    <div class="boot-container">
        <div id="boot-glow"></div>
        <div id="google-logo" style="display:none;">
            <svg viewBox="0 0 24 24" width="60" height="60">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
            </svg>
        </div>
        <div id="boot-progress"><div id="boot-bar"></div></div>
    </div>
</div>

<div class="phone-frame">
    <div id="home-screen">
        <div style="text-align: center; margin-top: 40px;">
            <h1 id="clock" style="font-size: 64px; font-weight: 300; margin: 0;">00:00</h1>
            <p id="date" style="color: #888; font-size: 18px; margin-top: 5px;">Loading...</p>
        </div>
        
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 40px 0;">
            <div class="app" onclick="openApp('settings-page')" style="text-align: center; cursor: pointer;">
                <div style="font-size: 30px; background: #222; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; border-radius: 14px; margin: 0 auto 8px;">⚙️</div>
                <span style="font-size: 11px; color: #888;">Settings</span>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="dock-icon" onclick="openApp('phone-page')">📞</div>
            <div class="dock-icon" onclick="openApp('messages-page')">💬</div>
            <div class="dock-icon" onclick="openApp('chrome-page')">🌐</div>
            <div class="dock-icon" onclick="openApp('camera-page')">📷</div>
        </div>
    </div>

    <div id="settings-page" class="modal">
        <div class="modal-header">
            <span onclick="closeApp('settings-page')" style="color:#4285F4; cursor:pointer; font-size:24px; margin-right:15px;">←</span>
            <span>Settings</span>
        </div>
        <div class="modal-content">
            <div class="item" onclick="openApp('about-page')">
                <p>About Phone</p>
                <small>PixelWeb Core 0.9.5</small>
            </div>
        </div>
    </div>

    <div id="about-page" class="modal">
        <div class="modal-header">
            <span onclick="backToSettings('about-page')" style="color:#4285F4; cursor:pointer; font-size:24px; margin-right:15px;">←</span>
            <span>About Phone</span>
        </div>
        <div class="modal-content">
            <p style="color: #888; margin-top: 20px; font-size: 14px;">Developer</p>
            <p style="font-size: 18px;">weirzxx</p>
        </div>
    </div>

    <div id="phone-page" class="modal"><div class="modal-header"><span onclick="closeApp('phone-page')" style="color:var(--blue); cursor:pointer; font-size:24px; margin-right:15px;">←</span><span>Phone</span></div></div>
    <div id="messages-page" class="modal"><div class="modal-header"><span onclick="closeApp('messages-page')" style="color:var(--blue); cursor:pointer; font-size:24px; margin-right:15px;">←</span><span>Messages</span></div></div>
    <div id="chrome-page" class="modal"><div class="modal-header"><span onclick="closeApp('chrome-page')" style="color:var(--blue); cursor:pointer; font-size:24px; margin-right:15px;">←</span><span>Chrome</span></div></div>
    <div id="camera-page" class="modal"><div class="modal-header"><span onclick="closeApp('camera-page')" style="color:var(--blue); cursor:pointer; font-size:24px; margin-right:15px;">←</span><span>Camera</span></div></div>

    <div class="home-indicator" id="home-gesture"></div>
</div>

<script>
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('boot-glow').style.display = 'none';
            document.getElementById('google-logo').style.display = 'block';
            document.getElementById('boot-progress').style.display = 'block';
            setTimeout(() => { document.getElementById('boot-bar').style.width = '100%'; }, 100);
            setTimeout(() => {
                document.getElementById('boot-screen').style.opacity = '0';
                setTimeout(() => { document.getElementById('boot-screen').style.display = 'none'; }, 800);
            }, 3000);
        }, 1500);
    });

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    }
    setInterval(updateTime, 1000); updateTime();

    function openApp(id) {
        const el = document.getElementById(id);
        el.style.display = 'flex';
        setTimeout(() => el.classList.add('active'), 10);
        document.getElementById('home-screen').classList.add('home-hidden');
    }

    function closeApp(id) {
        const el = document.getElementById(id);
        el.classList.remove('active');
        document.getElementById('home-screen').classList.remove('home-hidden');
        setTimeout(() => { el.style.display = 'none'; }, 400);
    }

    function backToSettings(id) {
        const el = document.getElementById(id);
        el.classList.remove('active');
        setTimeout(() => { el.style.display = 'none'; }, 400);
    }

    function toggleCC() {
        document.getElementById('control-center').classList.toggle('active');
    }
</script>
</body>
</html>
